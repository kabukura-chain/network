    body {
      background: #000800;
      color: var(--g);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .admin-header {
      background: #0d0000;
      border-bottom: 2px solid #ff4400;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(200,0,0,0.4);
    }
    .admin-header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      color: #ff6666;
      letter-spacing: 3px;
    }
    .admin-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff4400;
      box-shadow: 0 0 8px #ff0000;
      animation: blink 1.1s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; box-shadow:0 0 8px #ff0000; }
      50%      { opacity:0.3; box-shadow:0 0 2px #ff0000; }
    }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(0,255,65,0.5);
      color: var(--g);
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 2px;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(0,255,65,0.1); }

    /* ── LAYOUT ── */
    .admin-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ── SECTION ── */
    .section {
      border: 1px solid rgba(0,255,65,0.2);
      background: rgba(0,10,0,0.6);
      padding: 18px;
      margin-bottom: 20px;
    }
    .section-title {
      color: #669966;
      font-size: 0.68rem;
      letter-spacing: 3px;
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(0,255,65,0.1);
      padding-bottom: 8px;

    /* ── INPUTS ── */
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    input[type="text"], input[type="number"] {
      background: #000800;
      border: 1px solid rgba(0,255,65,0.35);
      color: var(--g);
      font-family: inherit;
      font-size: 0.78rem;
      padding: 7px 10px;
      flex: 1;
      min-width: 0;
    }
    input:focus { outline: none; border-color: var(--g); }
    .btn {
      background: rgba(0,255,65,0.12);
      border: 1px solid rgba(0,255,65,0.5);
      color: var(--g);
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 2px;
      padding: 7px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn:hover { background: rgba(0,255,65,0.25); }
    .btn-red {
      border-color: rgba(255,80,80,0.5);
      color: #ff8888;
    }
    .btn-red:hover { background: rgba(255,80,80,0.15); }

    /* ── GENERATED CODE ── */
    #cp-generated {
      color: var(--g);
      font-size: 0.9rem;
      letter-spacing: 4px;
      min-height: 22px;
      margin-bottom: 6px;
    }

    /* ── DM TEXTAREA ── */
    textarea {
      width: 100%;
      background: #000500;
      border: 1px solid rgba(0,255,65,0.3);
      color: #99dd99;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      line-height: 1.9;
      padding: 12px 14px;
      resize: none;
      min-height: 360px;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }
    .dm-btns { display: flex; gap: 8px; margin-top: 8px; }
    .dm-btns .btn { flex: 1; text-align: center; }

    /* ── BLUE LIST ── */
    .blue-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .blue-item {
      display: flex;
      align-items: center;
      gap: 4px;

      border: 1px solid rgba(0,255,65,0.2);

      font-size: 0.68rem;

      color: #669966;
      border-bottom: 1px solid #1a3a1a;
      padding: 6px 6px;
      text-align: left;
      letter-spacing: 1px;

      color: var(--g);

      padding: 6px 6px;

    .action-cell { white-space: nowrap; }

      width: 100%;

      font-size: 0.66rem;

      text-align: left;
      letter-spacing: 1px;

      padding: 6px 4px;

    .depth-input { width: 60px !important; flex: none !important; }

      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;

let DB_REF = null;
let DB = { initialized: true, blocks: [], invites: {}, reports: {}, banned: [], settings: {} };
let editTargetId = null;

/* ── ユーティリティ ── */
const norm = s => (s || '').trim().toLowerCase().replace(/^@/, '');

function normalize(data) {
  if (!data.reports)  data.reports  = {};
  if (!data.banned)   data.banned   = [];
  if (!data.blocks)   data.blocks   = [];
  if (!data.invites)  data.invites  = {};
  if (!data.settings) data.settings = {};
  data.blocks.forEach(b => { if (!b.recs) b.recs = []; });
  return data;
}

function save(d) {
  if (DB_REF) DB_REF.set(d).catch(e => console.error('Firebase save error:', e));
}

function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.borderColor = ok ? 'rgba(0,255,65,0.5)' : 'rgba(255,80,80,0.5)';
  el.style.color = ok ? 'var(--g)' : '#ff8888';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 2800);
}

function generateCode() {
  const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const seg = () => Array.from({length:4}, () => c[Math.floor(Math.random()*c.length)]).join('');
  return `KBK-${seg()}`;
}

function makeCodesForUser(handle, depth) {
  const maxDepth = (DB.settings && DB.settings.maxDepth) || 4;
  if (depth >= maxDepth) return [];
  const codes = [];
  for (let i = 0; i < 3; i++) {
    let code;
    do { code = generateCode(); } while (DB.invites[code]);
    DB.invites[code] = { code, generatedBy: handle, depth: depth + 1, used: false, usedBy: null, ts: Date.now() };
    codes.push(code);
  }
  return codes;
}

/* ── toGraph（青/緑判定用） ── */
function toGraph(blocks) {
  const nm = new Map();
  const banned = new Set(DB.banned || []);
  const addNode = (id, handle, reg) => {
    if (!nm.has(id) && !banned.has(id)) nm.set(id, { id, handle, reg });
  };
  blocks.filter(b => !banned.has(b.id)).forEach(b => {
    addNode(b.id, b.handle, true);
    b.recs.filter(r => !banned.has(r)).forEach(r => addNode(r, r, false));
  });
  return { nodes: [...nm.values()] };
}

/* ── 段数設定 ── */
function saveMaxDepth() {
  const val = parseInt(document.getElementById('cp-depth').value);
  if (isNaN(val) || val < 1 || val > 10) { toast('1〜10の値を入力してください', false); return; }
  if (!DB.settings) DB.settings = {};
  DB.settings.maxDepth = val;
  save(DB);
  toast(`最大段数を ${val} 段に設定しました`);
}

/* ── 招待コード発行 ── */
function adminGenerateCode() {
  const forHandle = norm(document.getElementById('cp-for-handle').value) || 'admin';
  let code;
  do { code = generateCode(); } while (DB.invites[code]);
  DB.invites[code] = { code, generatedBy: 'admin', depth: 1, used: false, usedBy: null, forHandle, ts: Date.now() };
  save(DB);
  document.getElementById('cp-generated').textContent = `発行: ${code}`;
  renderCodeList();
  showDmTemplate(code);
}

function selectDmText() { document.getElementById('cp-dm-text').select(); }
function copyDmText() {
  const ta = document.getElementById('cp-dm-text');
  const btn = document.getElementById('cp-copy-btn');
  navigator.clipboard.writeText(ta.value).then(() => {

/* ── 青→緑変換 ── */
function renderBlueList() {
  const el = document.getElementById('cp-blue-list');
  const { nodes } = toGraph(DB.blocks);
  const blues = nodes.filter(n => !n.reg).map(n => n.id)
    .sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
  if (blues.length === 0) {
    el.innerHTML = '<p style="color:#1a4a1a;font-size:0.7rem">青アイコンの人はいません</p>';
    return;
  }
  let html = '<div class="blue-grid">';
  blues.forEach(id => {
    html += `<div class="blue-item">
      <span>@${id}</span>
      <button class="btn" style="padding:2px 8px;font-size:0.65rem" onclick="makeBlueGreen('${id}')">→緑</button>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function makeBlueGreen(id) {
  if (DB.blocks.find(b => b.id === id)) { toast(`@${id} はすでに登録済みです`, false); return; }
  DB.blocks.push({ id, handle: id, recs: [], depth: 0, ts: Date.now(), manualReg: true });
  save(DB);
  renderBlueList();
  renderUserList();
  toast(`@${id} を緑に変更しました`);
}

/* ── 登録ユーザー管理 ── */
function renderUserList() {
  const el = document.getElementById('user-list');
  const banned = new Set(DB.banned || []);
  const users = DB.blocks.filter(b => !banned.has(b.id))
    .sort((a, b) => a.id.toLowerCase().localeCompare(b.id.toLowerCase()));
  if (users.length === 0) {
    el.innerHTML = '<p style="color:#1a4a1a;font-size:0.7rem">登録者なし</p>';
    return;
  }
  let html = `<table class="user-table">
    <tr><th>ハンドル</th><th>推薦</th><th>段</th><th>操作</th></tr>`;
  users.forEach(b => {
    const recs = (b.recs || []).map(r => `@${r}`).join(', ') || '—';
    html += `<tr>
      <td><a href="https://x.com/${b.id}" target="_blank" rel="noopener" style="color:var(--g);text-decoration:none">@${b.id}</a></td>
      <td class="recs-cell">${recs}</td>
      <td style="color:#669966">${b.depth || '—'}</td>
      <td class="action-cell">
        <button class="btn" style="font-size:0.62rem;padding:3px 8px" onclick="openEditModal('${b.id}')">編集</button>
        <button class="btn btn-red" style="font-size:0.62rem;padding:3px 8px" onclick="confirmDelete('${b.id}')">削除</button>
      </td>
    </tr>`;
  });
  html += '</table>';
  el.innerHTML = html;
}

function confirmDelete(id) {
  if (confirm(`@${id} を削除しますか？\n（この人を推薦している全ブロックからも削除されます）`)) {
    deleteBlock(id);
  }
}

function deleteBlock(id) {
  DB.blocks = DB.blocks.filter(b => b.id !== id);
  DB.blocks.forEach(b => { b.recs = b.recs.filter(r => r !== id); });
  if (DB.reports && DB.reports[id]) delete DB.reports[id];
  save(DB);
  renderUserList();
  renderBlueList();
  toast(`@${id} を削除しました`);
}

/* ── コード一覧 ── */
function renderCodeList() {
  const invites = DB.invites || {};
  const keys = Object.keys(invites).sort((a, b) => (invites[b].ts || 0) - (invites[a].ts || 0));
  if (keys.length === 0) {
    document.getElementById('cp-code-list').innerHTML = '<p style="color:#1a4a1a;font-size:0.7rem">コードなし</p>';
    return;
  }
  let html = `<table class="code-table">
    <tr><th>コード</th><th>段</th><th>発行者</th><th>使用者</th></tr>`;
  keys.forEach(k => {
    const iv = invites[k];
    const cl = iv.used ? 'used' : '';
    html += `<tr>
      <td class="code-str ${cl}">${iv.code}</td>
      <td class="${cl}">${iv.depth}</td>
      <td class="${cl}">@${iv.generatedBy}</td>
      <td class="${cl}">${iv.used ? '@' + iv.usedBy : '未使用'}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('cp-code-list').innerHTML = html;
}

/* ── 編集モーダル ── */
function openEditModal(id) {
  const block = DB.blocks.find(b => b.id === id);
  if (!block) return;
  editTargetId = id;
  document.getElementById('edit-modal-title').textContent = `[ @${block.handle} の推薦を編集 ]`;
  const container = document.getElementById('edit-current-recs');
  container.innerHTML = '';
  if (!block.recs || block.recs.length === 0) {
    container.innerHTML = '<p style="color:#555;font-size:0.72rem">推薦なし</p>';
  } else {
    block.recs.forEach(r => {
      const row = document.createElement('div');
      row.className = 'edit-rec-row';
      row.innerHTML = `<span>@${r}</span><button class="btn btn-red" style="font-size:0.62rem;padding:2px 8px" onclick="removeRec('${id}','${r}')">削除</button>`;
      container.appendChild(row);
    });
  }
  const slots = 3 - (block.recs ? block.recs.length : 0);
  ['edit-add-1','edit-add-2','edit-add-3'].forEach((fid, i) => {
    const el = document.getElementById(fid);
    el.value = '';
    el.style.display = i < slots ? 'block' : 'none';
  });
  document.getElementById('edit-modal').style.display = 'flex';
}

function removeRec(blockId, recId) {
  const block = DB.blocks.find(b => b.id === blockId);
  if (!block) return;
  block.recs = block.recs.filter(r => r !== recId);
  save(DB);
  renderUserList();
  openEditModal(blockId);
}

function saveEditBlock() {
  const block = DB.blocks.find(b => b.id === editTargetId);
  if (!block) return;
  const adds = ['edit-add-1','edit-add-2','edit-add-3']
    .map(fid => norm(document.getElementById(fid).value))
    .filter(v => v.length > 0);
  for (const r of adds) {
    if (!/^[a-zA-Z0-9_]{1,50}$/.test(r)) { toast(`@${r} は無効なハンドルです`, false); return; }
    if (r === block.id) { toast('本人を推薦することはできません', false); return; }
    if (block.recs && block.recs.includes(r)) { toast(`@${r} はすでに推薦済みです`, false); return; }
  }
  if (!block.recs) block.recs = [];
  const total = block.recs.length + adds.length;
  if (total > 3) { toast(`推薦は最大3名までです（現在${block.recs.length}名）`, false); return; }
  block.recs.push(...adds);
  save(DB);
  renderUserList();
  closeEditModal();
  toast(`@${block.handle} の推薦を更新しました`);
}

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
  editTargetId = null;
}

/* ── 全体再描画 ── */
function renderAll() {
  renderBlueList();
  renderUserList();
  renderCodeList();
  const maxDepth = (DB.settings && DB.settings.maxDepth) || 4;
  document.getElementById('cp-depth').value = maxDepth;
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', async () => {
  const loading = document.getElementById('loading');
  const content = document.getElementById('admin-content');
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    DB_REF = firebase.database().ref('network');
    const snap = await DB_REF.once('value');
    const existing = snap.val();
    if (existing && existing.initialized) {
      DB = normalize(existing);
    }
    loading.style.display = 'none';
    content.style.display = 'block';
    renderAll();
    // リアルタイム同期
    DB_REF.on('value', snap => {
      const data = snap.val();
      if (data && data.initialized) {
        DB = normalize(data);
        renderAll();
      }
    });
  } catch(e) {
    loading.textContent = '⚠ 接続エラー: ' + e.message;
    loading.style.color = '#ff4400';
  }
});
</script>
</body>
</html>
